# A/B alternative to score.yml — same result, WITHOUT OWASP-CTF/score-action.
#
# Instead of a docker container ACTION, the whole job runs INSIDE the scorer image as a
# job CONTAINER (jobs.<id>.container). Two differences worth testing vs the action:
#   - `container.credentials` authenticates the image pull, so this works even if
#     ghcr.io/owasp-ctf/score is INTERNAL/private (a docker action image can't — GitHub
#     pulls it anonymously). This is the main reason to A/B this shape.
#   - the same baked entrypoint.sh runs directly as a `run:` step (no action wrapper).
#
# The scorer image ships node + docker CLI but not git, so git is installed before checkout.
# The host docker socket is mounted so entrypoint.sh can build/boot the PR app as siblings.
#
# See: https://docs.github.com/actions/reference/workflows-and-actions/workflow-syntax#example-running-a-job-within-a-container
name: score-container

on:
  pull_request_target:
    branches: [master]
    types: [opened, synchronize, reopened]

concurrency:
  group: score-container-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read # checkout the PR head for entrypoint.sh to docker-build
      packages: read # pull the scorer image (credentials below → works even if internal)
      id-token: write # mint the OIDC id-token POST /score authorizes
      pull-requests: write # the result comment
    container:
      image: ghcr.io/owasp-ctf/score:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock # drive the host daemon (build/boot the app)
    env:
      TARGET: dvwa
      APP_URL: http://app
      SCORE_API: https://dyekymos1dkde.cloudfront.net # TEMP until api.ctf.owasp.org DNS lands
    steps:
      - name: Install git (the scorer image ships node + docker CLI, not git)
        run: apt-get update && apt-get install -y --no-install-recommends git

      - name: Check out the PR head (untrusted — only docker-built by entrypoint.sh, never run on the host)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Mint the OIDC id-token for the leaderboard
        id: identity
        uses: cnuss/actions-identity@b9bc5d6472e00dfca0490bdf539eb4d4b729807d # v1.1.0
        with:
          id-token-audience: ctf-score

      - name: Score + record (the baked entrypoint, run directly)
        env:
          ID_TOKEN: ${{ steps.identity.outputs.id-token }}
        run: entrypoint.sh
