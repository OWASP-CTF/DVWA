# ─────────────────────────────────────────────────────────────────────────────
# PASTE-READY consumer workflow for a DVWA CTF fork.
# Copy this into the DVWA fork as: .github/workflows/ctf-score.yml
#
# The DVWA app requires a MariaDB sidecar (started as `db` on `ctfnet`) and a
# one-off database initialisation via setup.php before scoring can begin.
#
# Prerequisites:
#   - Disable inherited upstream workflows on the fork so only this ctf-score
#     job runs (see ../dvwa-consumer/README.md).
#   - ghcr.io/owasp-ctf/score is PRIVATE; the DVWA fork has been granted Read
#     access so this job's GITHUB_TOKEN can pull it (see README.md step 2).
#     Do NOT make it public.
#
# DESIGN — the scorer image is self-contained: the DVWA challenge rubric
# (regression tests) is baked into the binary, so `score --target dvwa
# --url http://app` is passed with NO --dir flags. Scoring is purely
# behavioral — no source mount is needed.
#
# SECURITY — pull_request_target runs with the BASE repo's GITHUB_TOKEN while
# the PR is UNTRUSTED code. The `score` job (the only one that touches PR code)
# holds no write scopes, builds + runs the PR's app on an --internal Docker
# network with NO docker socket, NO secrets, and NO mounted test files, and
# uploads only the rendered table. The privileged `comment` job
# (pull-requests: write) runs NONE of the PR's code.
# ─────────────────────────────────────────────────────────────────────────────
name: ctf-score

on:
  pull_request_target:
    branches: [master] # set to the DVWA fork's CTF branch
    types: [opened, synchronize, reopened]

concurrency:
  group: ctf-score-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# No ambient permissions — each job opts into the minimum it needs.
permissions: {}

env:
  SCORER_IMAGE: ghcr.io/owasp-ctf/score:latest

jobs:
  # Builds + runs the UNTRUSTED PR app sandboxed, then scores it. No write scopes.
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - name: Check out the PR head (untrusted — used only to docker build the app)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Log in to GHCR (pull the private scorer image)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull the private scorer image
        run: docker pull "$SCORER_IMAGE"

      - name: Build the PR's app image (untrusted Dockerfile, no secrets/build-args)
        run: docker build -t ctf-app:pr .

      - name: Create an isolated, internet-less network
        run: docker network create --internal ctfnet

      - name: Start MariaDB on the internal network
        run: |
          docker run -d --name db --network ctfnet \
            -e MYSQL_ROOT_PASSWORD=dvwa -e MYSQL_DATABASE=dvwa \
            -e MYSQL_USER=dvwa -e MYSQL_PASSWORD='p@ssw0rd' \
            docker.io/library/mariadb:10

      - name: Start the DVWA app sandboxed (PR Dockerfile)
        run: |
          docker run -d --name app --network ctfnet \
            -e DB_SERVER=db -e DB_DATABASE=dvwa -e DB_USER=dvwa -e DB_PASSWORD='p@ssw0rd' \
            -e DEFAULT_SECURITY_LEVEL=low ctf-app:pr

      - name: Wait for DVWA to become healthy
        run: |
          for i in $(seq 1 120); do
            if docker run --rm --network ctfnet "$SCORER_IMAGE" \
                 node -e "fetch('http://app/login.php').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
              echo "DVWA up after ${i}s"; break
            fi; sleep 2
          done

      - name: Initialise the DVWA database
        run: |
          docker run --rm --network ctfnet "$SCORER_IMAGE" \
            node -e "fetch('http://app/setup.php',{method:'POST',headers:{'content-type':'application/x-www-form-urlencoded'},body:'create_db=Create+%2F+Reset+Database'}).then(()=>process.exit(0)).catch(()=>process.exit(0))"

      - name: Score the patched DVWA app (embedded rubric)
        run: |
          mkdir -p "$PWD/score-out"
          rc=0
          docker run --rm --network ctfnet \
            -e GITHUB_WORKSPACE=/out -v "$PWD/score-out:/out" -w /out \
            "$SCORER_IMAGE" score --target dvwa --url http://app || rc=$?
          if [ "$rc" -ge 100 ]; then echo "::error::scorer failed (exit $rc)"; exit "$rc"; fi
          echo "Scorer finished: $rc challenge(s) still open."

      - name: Stop containers
        if: always()
        run: docker rm -f app db 2>/dev/null || true

      - name: Ensure a score file exists
        if: always()
        run: |
          if [ ! -s "$PWD/score-out/ctf-score.md" ]; then
            printf '## CTF Patch Score\n\nThe score run produced no output — check the [job log](%s/%s/actions/runs/%s).\n' \
              "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}" \
              > "$PWD/score-out/ctf-score.md"
          fi

      - name: Upload the score table + JSON sidecar
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctf-score
          path: |
            score-out/ctf-score.md
            score-out/ctf-score.json
          if-no-files-found: error

  # Writes the score to the Upstash leaderboard from inside the scoring image. Isolated like
  # `comment`: NEVER checks out / builds / runs PR code, has internet (default network, NOT
  # ctfnet), and is the ONLY job that sees the Upstash secret. Best-effort: never fails the PR.
  publish:
    needs: score
    if: always()
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      pushed: ${{ steps.push.outputs.pushed }}
    steps:
      - name: Log in to GHCR (pull the private scorer image)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull the private scorer image
        run: docker pull "$SCORER_IMAGE"

      - name: Download the score artifact (table + JSON sidecar)
        uses: actions/download-artifact@v4
        # Best-effort: if `score` crashed before uploading, don't turn this job red — the
        # scorer's --push exits 0 on a missing sidecar anyway.
        continue-on-error: true
        with:
          name: ctf-score
          path: score-out

      - name: Push the score to the Upstash leaderboard
        id: push
        # No --network ctfnet: this run needs internet and never touches the PR app. The Upstash
        # secret is materialised ONLY here, in a job that runs no contestant code. Team identity
        # comes from the GitHub event (not PR code), so it cannot be forged.
        env:
          CTF_UPSTASH_REDIS_REST_URL: ${{ secrets.CTF_UPSTASH_REDIS_REST_URL }}
          CTF_UPSTASH_REDIS_REST_TOKEN: ${{ secrets.CTF_UPSTASH_REDIS_REST_TOKEN }}
          CTF_TEAM: ${{ github.event.pull_request.user.login }}
          CTF_PR: ${{ github.event.pull_request.number }}
          CTF_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ -z "$CTF_UPSTASH_REDIS_REST_URL" ]; then
            echo "No Upstash config — leaderboard push disabled."; exit 0
          fi
          # GITHUB_WORKSPACE=/out tells the scorer where to find ctf-score.json
          out=$(docker run --rm \
            -e GITHUB_WORKSPACE=/out -v "$PWD/score-out:/out" -w /out \
            -e CTF_UPSTASH_REDIS_REST_URL -e CTF_UPSTASH_REDIS_REST_TOKEN \
            -e CTF_TEAM -e CTF_PR -e CTF_SHA \
            "$SCORER_IMAGE" score --push)
          echo "$out"
          # ACK gate: the scorer prints "leaderboard updated for <team>" only on a successful
          # ZADD — so a skip (no team) or a swallowed HTTP error won't trigger a false ACK.
          if printf '%s' "$out" | grep -q "leaderboard updated for"; then
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

  # ACK the recorded score on the PR. Leak-safe: confirms the submission landed WITHOUT the
  # score table (which would reveal which challenges are solved). Posts only when the leaderboard
  # write actually succeeded. NEVER runs the PR's code.
  ack:
    needs: publish
    if: ${{ always() && needs.publish.outputs.pushed == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Upsert the leaderboard ACK comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ctf-score-ack -->';
            const sha = (context.payload.pull_request.head.sha || '').slice(0, 7);
            const body = `${marker}\n🏁 **Score recorded**\n\n`
              + `Your patch was evaluated and your result has been saved to the leaderboard.\n\n`
              + `Commit: \`${sha}\``;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  # Privileged comment job — downloads the rendered table and upserts the PR comment.
  # NEVER runs the PR's code.
  comment:
    needs: score
    # Opt-in: the score table reveals which challenges are solved (solution hints), so it is
    # OFF by default. Set repository variable CTF_POST_COMMENT=true to post it.
    if: ${{ always() && vars.CTF_POST_COMMENT == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Download the score table
        uses: actions/download-artifact@v4
        with:
          name: ctf-score
          path: score-out

      - name: Upsert the score comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- ctf-score -->';
            const file = 'score-out/ctf-score.md';
            const body = `${marker}\n` + (fs.existsSync(file)
              ? fs.readFileSync(file, 'utf8')
              : 'CTF score run produced no output.');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

